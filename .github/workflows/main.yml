# GitHub Container Registry를 활용한 K8s 애플리케이션 자동 배포 파이프라인입니다.
name: K8s App GHCR Pipeline

on:
  push:
    branches: ["main"]
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/k8s-test-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}},value=${{ github.ref_name }}
            # 브랜치에 코드가 푸시될 경우 Git SHA 값을 긴 형식으로 태그에 포함합니다.
            type=sha,format=long
            # 'v'로 시작하는 태그가 푸시될 때만 'latest' 태그를 활성화하여 운영 환경의 혼란을 방지합니다.
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
